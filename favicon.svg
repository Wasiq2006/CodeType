<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#00ff88" opacity="0.1"/>
  
  <!-- Main keyboard shape -->
  <rect x="10" y="20" width="44" height="28" rx="3" fill="none" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Top row of keys -->
  <rect x="14" y="24" width="5" height="5" rx="1" fill="#00ff88" opacity="0.7"/>
  <rect x="21" y="24" width="5" height="5" rx="1" fill="#00ff88" opacity="0.7"/>
  <rect x="28" y="24" width="5" height="5" rx="1" fill="#00ff88" opacity="0.7"/>
  <rect x="35" y="24" width="5" height="5" rx="1" fill="#00ff88" opacity="0.7"/>
  <rect x="42" y="24" width="5" height="5" rx="1" fill="#00ff88" opacity="0.7"/>
  
  <!-- Middle row of keys -->
  <rect x="14" y="32" width="5" height="5" rx="1" fill="#00ff88" opacity="0.5"/>
  <rect x="21" y="32" width="5" height="5" rx="1" fill="#00ff88" opacity="0.5"/>
  <rect x="28" y="32" width="5" height="5" rx="1" fill="#00ff88" opacity="0.85"/>
  <rect x="35" y="32" width="5" height="5" rx="1" fill="#00ff88" opacity="0.5"/>
  <rect x="42" y="32" width="5" height="5" rx="1" fill="#00ff88" opacity="0.5"/>
  
  <!-- Bottom row of keys -->
  <rect x="14" y="40" width="5" height="5" rx="1" fill="#00ff88" opacity="0.6"/>
  <rect x="21" y="40" width="5" height="5" rx="1" fill="#00ff88" opacity="0.6"/>
  <rect x="28" y="40" width="5" height="5" rx="1" fill="#00ff88" opacity="0.9"/>
  <rect x="35" y="40" width="5" height="5" rx="1" fill="#00ff88" opacity="0.6"/>
  <rect x="42" y="40" width="5" height="5" rx="1" fill="#00ff88" opacity="0.6"/>
  
  <!-- Center key highlight (typing focus) -->
  <circle cx="30.5" cy="34.5" r="3.5" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
</svg>
