<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeType • Statistics</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #161616;
      --surface2: #1c1c1c;
      --border:   #262626;
      --border2:  #333333;
      --text:     #a0a0a0;
      --dim:      #444444;
      --hi:       #e8e8e8;
      --correct:  #4ade80;
      --wrong:    #f87171;
      --nav-h:    52px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      height: var(--nav-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
      flex-shrink: 0;
    }

    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--hi);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-logo:hover { color: var(--hi); opacity: 0.8; }

    .nav-back {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
      padding: 4px 8px;
    }
    .nav-back:hover { color: var(--hi); }

    .nav-reset {
      background: none;
      border: 1px solid transparent;
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 5px 12px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .nav-reset:hover {
      color: var(--wrong);
      background: rgba(248, 113, 113, 0.08);
      border-color: rgba(248, 113, 113, 0.2);
    }

    .nav-reset:active {
      transform: scale(0.95);
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .stats-container {
      width: 100%;
      max-width: 700px;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--hi);
      margin-bottom: 32px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(232, 232, 232, 0.03) 0%, rgba(168, 160, 255, 0.02) 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .stat-card:hover {
      background: linear-gradient(135deg, rgba(232, 232, 232, 0.08) 0%, rgba(168, 160, 255, 0.06) 100%);
      border-color: var(--hi);
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 32px rgba(232, 232, 232, 0.1);
    }

    .stat-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      font-weight: 500;
      color: var(--hi);
      margin-bottom: 8px;
    }

    .stat-card .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .stat-card .stat-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--correct);
      letter-spacing: 0.05em;
      margin-top: 8px;
      opacity: 0.8;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border);
    }
    .section-header .section-title {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .chart-tabs { display: flex; gap: 4px; }
    .chart-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .chart-tab:hover { color: var(--text); border-color: var(--border2); }
    .chart-tab.active { color: var(--correct); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.06); }

    .stats-section {
      margin-bottom: 40px;
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hi);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border);
      font-weight: 500;
    }

    .difficulty-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .diff-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .diff-stat:hover {
      border-color: var(--hi);
      background: rgba(232, 232, 232, 0.05);
      transform: translateY(-3px);
    }

    .diff-label {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .diff-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: var(--hi);
      font-weight: 500;
    }

    /* ── WPM chart ── */
    .chart-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 20px 12px;
      height: 220px;
      position: relative;
    }

    /* ── Per-language stats ── */
    .lang-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .lang-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lang-stat:hover { 
      border-color: var(--hi); 
      background: rgba(232,232,232,0.05);
      transform: translateY(-3px);
    }
    .lang-label {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .lang-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: var(--hi);
      font-weight: 500;
    }
    .lang-sub {
      font-size: 10px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    .recent-runs {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .run-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
      font-size: 12px;
      animation: slideIn 0.4s ease forwards;
    }
    .run-item:hover { background: var(--surface); }
    .run-item:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .run-wpm {
      font-family: 'JetBrains Mono', monospace;
      color: var(--hi);
      font-weight: 500;
      min-width: 60px;
      text-align: left;
    }

    .run-meta {
      color: var(--dim);
      flex: 1;
      margin: 0 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .run-acc {
      color: var(--correct);
      font-weight: 500;
      min-width: 50px;
      text-align: right;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--dim);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }

    .ghost-race-card {
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.08) 0%, rgba(74, 222, 128, 0.04) 100%);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 8px;
      padding: 24px;
      margin: 24px 0;
      text-align: center;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .ghost-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .ghost-wpm {
      font-size: 42px;
      font-weight: 600;
      color: var(--correct);
      margin: 12px 0;
      text-shadow: 0 0 12px rgba(74, 222, 128, 0.3);
    }

    .ghost-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .ghost-tip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      font-style: italic;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }

    .analytics-card {
      background: rgba(74, 222, 128, 0.05);
      border: 1px solid rgba(74, 222, 128, 0.1);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .analytics-card:hover {
      background: rgba(74, 222, 128, 0.1);
      border-color: rgba(74, 222, 128, 0.2);
      transform: translateY(-2px);
    }

    .analytics-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .analytics-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--correct);
      margin: 8px 0;
    }

    .analytics-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    /* ── Loading Screen ── */
    #loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex;
      flex-direction: column; align-items: center; justify-content: center; opacity: 1;
      transition: opacity 0.5s ease, visibility 0.5s ease; visibility: visible; }
    #loading-screen.hidden { opacity: 0; visibility: hidden; }
    .loading-container { display: flex; flex-direction: column; align-items: center; gap: 32px; }
    .loading-logo { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600;
      color: var(--hi); letter-spacing: 0.05em; }
    .loading-logo span { color: var(--correct); }
    .loading-dots { display: flex; align-items: center; gap: 10px; }
    .loading-dots i { display: block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--correct); opacity: 0.2;
      animation: dotPulse 1.2s ease-in-out infinite; }
    .loading-dots i:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots i:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); } }

    @media (max-width: 600px) {
      .difficulty-stats { grid-template-columns: 1fr; }
      .analytics-grid { grid-template-columns: 1fr 1fr; }
      .nav-logo { font-size: 14px; }
      nav { 
        padding: 0 12px; 
        flex-wrap: wrap;
        gap: 8px;
      }
      .nav-back, .nav-reset {
        font-size: 11px;
        padding: 4px 10px;
      }
      main { padding: 32px 16px; }
      .ghost-wpm { font-size: 32px; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-container">
      <div class="loading-logo">Code<span>Type</span></div>
      <div class="loading-dots"><i></i><i></i><i></i></div>
    </div>
  </div>

  <nav>
    <button class="nav-back" onclick="window.location.href='codetype.html'">&larr; back to typing</button>
    <a href="codetype.html" class="nav-logo">codetype</a>
    <button class="nav-reset" id="reset-btn" title="Reset all statistics">reset data</button>
  </nav>

  <main>
    <div class="stats-container" id="stats-container">
      <!-- Loaded dynamically -->
    </div>
  </main>

  <script>
    const dom = {
      container: document.getElementById('stats-container'),
    };

    function getStats() {
      let history = [];
      try { history = JSON.parse(localStorage.getItem('codetype_history')) || []; } catch(e) {}
      const bestWpm = parseInt(localStorage.getItem('codetype_best_wpm')) || 0;
      const runs = parseInt(localStorage.getItem('codetype_runs')) || 0;
      return { history, bestWpm, runs };
    }

    function avg(arr) {
      return arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : null;
    }

    function renderStats() {
      const { history, bestWpm, runs } = getStats();

      if (runs === 0) {
        dom.container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">○</div>
            <div class="empty-state-text">no statistics yet<br />complete a run to get started</div>
          </div>
        `;
        return;
      }

      // Overall averages
      const avgWpm = avg(history.map(r => r.wpm));
      const avgAcc = avg(history.map(r => r.acc));

      // By difficulty
      const byDiff = { easy: [], medium: [], hard: [] };
      history.forEach(r => { if (byDiff[r.diff]) byDiff[r.diff].push(r.wpm); });
      const fmt = v => v === null ? '<span style="color:var(--dim)">--</span>' : v;

      // By language
      const byLang = { python: [], cpp: [] };
      history.forEach(r => { if (byLang[r.lang]) byLang[r.lang].push(r.wpm); });
      const fmtL = (v, runs) => v === null
        ? '<span style="color:var(--dim)">--</span>'
        : `${v}<div class="lang-sub">${runs} run${runs !== 1 ? 's' : ''}</div>`;

      // Recent runs — newest first
      let recentHtml = '';
      history.slice(0, 10).forEach(run => {
        recentHtml += `<div class="run-item">
          <div class="run-wpm">${Math.round(run.wpm)} wpm</div>
          <div class="run-meta">${run.lang} · ${run.diff}</div>
          <div class="run-acc">${run.acc}%</div>
        </div>`;
      });

      // Ghost Race - Best run details (used to enrich the best wpm card)
      const bestRunIndex = history.findIndex(r => r.wpm === bestWpm);
      const ghostRun = bestRunIndex >= 0 ? history[bestRunIndex] : history[0];

      // Time Breakdown - WPM over time for best run
      const bestRunTimeline = ghostRun?.wpmTimeline || [];
      const hasTimeline = bestRunTimeline && bestRunTimeline.length > 0;

      // Advanced Analytics
      const wpmConsistency = history.length > 1 ? calculateConsistency(history.map(r => r.wpm)) : 0;
      const improvement = history.length > 1 ? calculateImprovement(history.map(r => r.wpm)) : 0;
      const accuracyConsistency = history.length > 1 ? calculateConsistency(history.map(r => r.acc)) : 0;
      const fastestRun = Math.max(...history.map(r => r.wpm));
      const slowestRun = Math.min(...history.map(r => r.wpm));

      dom.container.innerHTML = `
        <div class="stats-title">statistics</div>

        <div class="stats-grid">
          <div class="stat-card"><div class="value">${runs}</div><div class="label">total runs</div></div>
          <div class="stat-card">
            <div class="value">${Math.round(bestWpm)}</div>
            <div class="label">best wpm</div>
            ${ghostRun ? `<div class="stat-sub">${ghostRun.lang} · ${ghostRun.diff} · ${ghostRun.acc}%</div>` : ''}
          </div>
          <div class="stat-card"><div class="value">${avgWpm}</div><div class="label">avg wpm</div></div>
          <div class="stat-card"><div class="value">${avgAcc}%</div><div class="label">avg accuracy</div></div>
        </div>

        <div class="stats-section" id="chart-section"${!hasTimeline && history.length < 2 ? ' style="display:none"' : ''}>
          <div class="section-header">
            <div class="section-title">performance</div>
            <div class="chart-tabs">
              <button class="chart-tab${history.length >= 2 ? ' active' : ''}" data-tab="trend"${history.length < 2 ? ' style="display:none"' : ''}>wpm trend</button>
              <button class="chart-tab${history.length < 2 && hasTimeline ? ' active' : ''}" data-tab="timeline"${!hasTimeline ? ' style="display:none"' : ''}>best run</button>
            </div>
          </div>
          <div class="chart-wrap" id="tab-trend"${history.length < 2 ? ' style="display:none"' : ''}>
            <canvas id="wpm-chart"></canvas>
          </div>
          <div class="chart-wrap" id="tab-timeline"${history.length >= 2 ? ' style="display:none"' : ''}>
            <canvas id="timeline-chart"></canvas>
          </div>
        </div>

        <div class="stats-section">
          <div class="section-title">advanced analytics</div>
          <div class="analytics-grid">
            <div class="analytics-card">
              <div class="analytics-label">consistency</div>
              <div class="analytics-value">${wpmConsistency}%</div>
              <div class="analytics-sub">in recent runs</div>
            </div>
            <div class="analytics-card">
              <div class="analytics-label">improvement</div>
              <div class="analytics-value">${improvement > 0 ? '+' : ''}${improvement}</div>
              <div class="analytics-sub">from first to last</div>
            </div>
            <div class="analytics-card">
              <div class="analytics-label">fastest run</div>
              <div class="analytics-value">${Math.round(fastestRun)}</div>
              <div class="analytics-sub">wpm</div>
            </div>
            <div class="analytics-card">
              <div class="analytics-label">slowest run</div>
              <div class="analytics-value">${Math.round(slowestRun)}</div>
              <div class="analytics-sub">wpm</div>
            </div>
            <div class="analytics-card">
              <div class="analytics-label">accuracy consistency</div>
              <div class="analytics-value">${accuracyConsistency}%</div>
              <div class="analytics-sub">stability</div>
            </div>
          </div>
        </div>

        <div class="stats-section">
          <div class="section-title">performance by difficulty</div>
          <div class="difficulty-stats">
            <div class="diff-stat"><div class="diff-label">easy</div><div class="diff-value">${fmt(avg(byDiff.easy))}</div></div>
            <div class="diff-stat"><div class="diff-label">medium</div><div class="diff-value">${fmt(avg(byDiff.medium))}</div></div>
            <div class="diff-stat"><div class="diff-label">hard</div><div class="diff-value">${fmt(avg(byDiff.hard))}</div></div>
          </div>
        </div>

        <div class="stats-section">
          <div class="section-title">performance by language</div>
          <div class="lang-stats">
            <div class="lang-stat"><div class="lang-label">python</div><div class="lang-value">${fmtL(avg(byLang.python), byLang.python.length)}</div></div>
            <div class="lang-stat"><div class="lang-label">c++</div><div class="lang-value">${fmtL(avg(byLang.cpp), byLang.cpp.length)}</div></div>
          </div>
        </div>

        <div class="stats-section">
          <div class="section-title">recent runs</div>
          <div class="recent-runs">
            ${recentHtml || '<div class="run-item" style="color:var(--dim);justify-content:center;padding:20px;">no runs yet</div>'}
          </div>
        </div>
      `;

      if (history.length >= 2) {
        initChart(history);
      }

      if (hasTimeline) {
        initTimelineChart(bestRunTimeline);
      }

      // Tab switching
      document.querySelectorAll('.chart-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          const trendEl = document.getElementById('tab-trend');
          const timelineEl = document.getElementById('tab-timeline');
          if (trendEl) trendEl.style.display = tab === 'trend' ? '' : 'none';
          if (timelineEl) timelineEl.style.display = tab === 'timeline' ? '' : 'none';
          if (tab === 'trend' && _trendChart) {
            _trendChart.resize();
            _trendChart.reset();
            _trendChart.update();
          }
          if (tab === 'timeline' && _timelineChart) {
            _timelineChart.resize();
            _timelineChart.reset();
            _timelineChart.update();
          }
        });
      });
    }

    function calculateConsistency(values) {
      if (values.length < 2) return 100;
      const mean = values.reduce((a, b) => a + b, 0) / values.length;
      const variance = values.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / values.length;
      const stdDev = Math.sqrt(variance);
      const cv = (stdDev / mean) * 100; // Coefficient of variation
      const consistency = Math.max(0, 100 - cv);
      return Math.round(consistency);
    }

    function calculateImprovement(values) {
      if (values.length < 2) return 0;
      // history is newest-first, so values[0] = most recent, values[last] = oldest
      return Math.round(values[0] - values[values.length - 1]);
    }

    let _trendChart = null, _timelineChart = null;

    function initChart(history) {
      const canvas = document.getElementById('wpm-chart');
      if (!canvas) return;
      // Chart shows runs in chronological order (oldest → newest)
      const data = history.slice().reverse();
      _trendChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: data.map((_, i) => `#${i + 1}`),
          datasets: [{
            data: data.map(r => r.wpm),
            borderColor: '#e8e8e8',
            backgroundColor: 'rgba(232,232,232,0.06)',
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: '#e8e8e8',
            pointHoverRadius: 5,
            borderWidth: 1.5,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 600, easing: 'easeOutQuart' },
          animations: {
            y: {
              duration: 600,
              easing: 'easeOutQuart',
              from: (ctx) => {
                if (ctx.type === 'data' && ctx.mode === 'default') {
                  return ctx.chart.scales.y.getPixelForValue(0);
                }
              },
              delay: (ctx) => ctx.type === 'data' ? ctx.dataIndex * 60 : 0,
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161616',
              borderColor: '#333333',
              borderWidth: 1,
              titleColor: '#a0a0a0',
              bodyColor: '#e8e8e8',
              callbacks: { label: ctx => ` ${ctx.raw} wpm` }
            }
          },
          scales: {
            x: {
              grid: { color: '#1c1c1c' },
              ticks: { color: '#444444', font: { family: 'JetBrains Mono', size: 10 } }
            },
            y: {
              grid: { color: '#1c1c1c' },
              ticks: { color: '#444444', font: { family: 'JetBrains Mono', size: 10 } },
              beginAtZero: false,
            }
          }
        }
      });
    }

    function initTimelineChart(timeline) {
      const canvas = document.getElementById('timeline-chart');
      if (!canvas || !timeline || timeline.length === 0) return;
      
      _timelineChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: timeline.map(t => t.time + 's'),
          datasets: [{
            data: timeline.map(t => t.wpm),
            borderColor: '#4ade80',
            backgroundColor: 'rgba(74, 222, 128, 0.08)',
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#4ade80',
            pointHoverRadius: 6,
            borderWidth: 2,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeOutCubic' },
          animations: {
            y: {
              duration: 700,
              easing: 'easeOutCubic',
              from: (ctx) => {
                if (ctx.type === 'data' && ctx.mode === 'default') {
                  return ctx.chart.scales.y.getPixelForValue(0);
                }
              },
              delay: (ctx) => ctx.type === 'data' ? ctx.dataIndex * 80 : 0,
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161616',
              borderColor: '#4ade80',
              borderWidth: 1,
              titleColor: '#4ade80',
              bodyColor: '#e8e8e8',
              callbacks: { label: ctx => ` ${ctx.raw} wpm` }
            }
          },
          scales: {
            x: {
              grid: { color: '#1c1c1c' },
              ticks: { color: '#444444', font: { family: 'JetBrains Mono', size: 10 } }
            },
            y: {
              grid: { color: '#1c1c1c' },
              ticks: { color: '#444444', font: { family: 'JetBrains Mono', size: 10 } },
              beginAtZero: false,
            }
          }
        }
      });
    }

    // Render on load
    renderStats();
    setTimeout(() => {
      const loader = document.getElementById('loading-screen');
      if (loader) loader.classList.add('hidden');
    }, 600);

    // Reset analytics functionality
    function resetAnalytics() {
      if (!confirm('Are you sure you want to reset all statistics? This cannot be undone.')) {
        return;
      }
      
      localStorage.removeItem('codetype_history');
      localStorage.removeItem('codetype_best_wpm');
      localStorage.removeItem('codetype_runs');
      
      // Notify all tabs
      window.dispatchEvent(new StorageEvent('storage', { key: 'codetype_history' }));
      
      renderStats();
    }

    document.getElementById('reset-btn').addEventListener('click', resetAnalytics);

    // Listen for storage changes (when codetype.html updates stats)
    window.addEventListener('storage', () => {
      renderStats();
    });
  </script>
</body>
</html>
